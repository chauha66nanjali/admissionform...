<!DOCTYPE html>
<html>
<head>
  <title>Admission Form</title>
  <style>
    input, select, textarea {
      display: block;
      margin-bottom: 10px;
      width: 300px;
      padding: 5px;
    }

    button {
      padding: 8px 15px;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      color: white;
    }

    .btn-submit { background-color: green; }
    .btn-update { background-color: orange; }
    .btn-delete { background-color: red; }

    .form-wrapper {
      border: 2px solid black;
      padding: 20px;
      border-radius: 5px;
      width: max-content;
    }

    /* ✅ Chatbot styles */
    #chatBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      border-radius: 50%;
      padding: 15px;
      cursor: pointer;
    }

    #chatBox {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 260px;
      background: white;
      border: 1px solid black;
      padding: 10px;
      border-radius: 10px;
    }

    #messages {
      height: 150px;
      overflow-y: auto;
      font-size: 14px;
    }

    /* 🔴 RED SEND BUTTON */
    #chatBox button {
      background-color: red;
      color: white;
      border-radius: 5px;
      width: 100%;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="form-wrapper">
  <h2>Admission Form</h2>

  <form id="admissionForm" enctype="multipart/form-data">

    <input type="text" name="fullname" placeholder="Full Name" required>
    <input type="date" name="dob" required>
    <select name="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
    <input type="email" name="email" placeholder="Email">
    <input type="tel" name="mobile" placeholder="Mobile">
    <select name="course" required>
      <option value="">Select Course</option>
      <option>BSC IT AI&ML</option>
      <option>BSC IT CYBER SECURITY</option>
      <option>IMCA AI&ML</option>
      <option>IMCA CYBER SECURITY</option>
    </select>
    <input type="file" name="photo">
    <textarea name="address" placeholder="Address"></textarea>

    <input type="text" id="studentId" placeholder="Enter Student ID">

    <button type="submit" class="btn-submit">Submit</button>
    <button type="button" id="updateBtn" class="btn-update">Update</button>
    <button type="button" id="deleteBtn" class="btn-delete">Delete</button>

  </form>
</div>

<!-- ✅ Chat Button -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<!-- ✅ Chat Box -->
<div id="chatBox">
  <div id="messages">
    <p><b>Bot:</b> Hello 👋 Help chahiye?</p>
  </div>

  <input type="text" id="userInput" placeholder="Type..."
    onkeypress="if(event.key==='Enter') sendMsg()">

  <button type="button" onclick="sendMsg()">Send</button>
</div>

<script>
// ===== Form Code =====
document.getElementById("admissionForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  try {
    const response = await fetch("http://localhost:3000/submit", {
      method: "POST",
      body: formData
    });
    const result = await response.json();
    alert(result.message);
    this.reset();
  } catch (error) {
    alert("Error submitting form");
  }
});

document.getElementById("deleteBtn").addEventListener("click", async function() {
  const id = document.getElementById("studentId").value.trim();
  if (!id) return alert("Enter Student ID");
  try {
    const response = await fetch(`http://localhost:3000/admissions/${id}`, {
      method: "DELETE"
    });
    const result = await response.json();
    alert(result.message);
  } catch {
    alert("Error deleting");
  }
});

document.getElementById("updateBtn").addEventListener("click", async function() {
  const id = document.getElementById("studentId").value.trim();
  if (!id) return alert("Enter Student ID");

  const formData = new FormData(document.getElementById("admissionForm"));
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch(`http://localhost:3000/admissions/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    const result = await response.json();
    alert(result.message);
  } catch {
    alert("Error updating");
  }
});

// ===== Chatbot Code =====
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function sendMsg() {
  let input = document.getElementById("userInput");
  let msg = input.value.toLowerCase().trim();
  let chat = document.getElementById("messages");

  if (!msg) return;

  chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;

  let reply = "";

  if (msg.includes("name")) {
    reply = "Full Name first field me likho.";
  } else if (msg.includes("email")) {
    reply = "Email format: example@gmail.com";
  } else if (msg.includes("course")) {
    reply = "Dropdown se course select karo.";
  } else if (msg.includes("mobile")) {
    reply = "Mobile 10 digits ka hona chahiye.";
  } else {
    reply = "Form fill karo ya specific question pucho 😊";
  }

  chat.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;
  chat.scrollTop = chat.scrollHeight;

  input.value = "";
}
</script>

</body>
</html>
